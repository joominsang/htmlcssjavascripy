<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .container {
        grid-template-areas:
        "header header header"
		"   a    main    b   "
		"   .     .      .   "
		"footer footer footer";
}
.header {
    grid-area: header;
}
.sidebar-a {
    grid-area: a;
}
.main-content {
    grid-area: main;
}
.sidebar-b {
    grid-area: b;
}
.footer {
    grid-area: footer;
}
    </style>
</head>
<body>
    <div class="container">
	<div class="item">A</div>
	<div class="item main-content">B</div>
	<div class="item main-content">C</div>
	<div class="item main-content">D</div>
	<div class="item sidebar-a">E</div>
	<div class="item">F</div>
	<div class="item">G</div>
	<div class="item">H</div>
	<div class="item">I</div>
</div>
    <div class="container">
	<div class="item">A2</div>
	<div class="item">B2</div>
	<div class="item">C2</div>
	<div class="item">D2</div>
	<div class="item">E2</div>
	<div class="item">F2</div>
	<div class="item">G2</div>
	<div class="item">H2</div>
	<div class="item">I2</div>
</div>
</body>
</html>
