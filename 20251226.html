
    <!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>노래 정보 반응형 페이지</title>
        <style>
        #mybody {
            margin:2px 2px;
            min-height: 250px;
        }
        #myheader {
            background-color: rgb(12, 12, 145);
            color: white;
        }
        #mynav {
            display: flex;
            justify-content: space-between;
        }
        .menuTitle {
        }
        .headerMenu {
            display: flex;
        }
        .headerMenuItem {
            cursor: pointer;
        }
        #mymain {
            display: flex;
            flex-direction: column;
            min-height: 200px;
            height: 80vh;
        }
        #myfooter {
            margin-top: auto;
            text-align: center;
        }
        div {
            /* border: 1px solid black; */
        }
        .heading_title {
            text-align: center;
            font-weight: 900;
        }
        .heading_text {
            text-align: center;
            font-size: 14px;
        }
        .content {
            max-width: 90vw;
            margin: 10px auto;
            padding: 5px;
            box-sizing: border-box;
            text-align: center;
        }
        .content_img {
            max-width: 50%;
        }
        #headerMenuPC {
            display: none;
            width: 100%;
        }
        #headerMenuMobile {
            display: flex;
        }
        .flexSpacebetween {
            width: 100%;
            display: flex;
            justify-content: space-between;
        }

        /*데스크탑 화면일때*/
        @media (min-width: 1024px) {
            #mynav {
            justify-content: start;
            }
            #headerMenuPC {
            display: grid;
            width: 92%;
            grid-template-columns: 50px 1fr 1fr 6fr;
            }
            #headerMenuMobile {
            display: none;
            }
            .headerMenuItem {

            width: 100%;
            }
            #mymain {
            flex-direction: row;
            justify-content: center;
            align-content: center;
            }
        }
        </style>
    </head>
    <body id="mybody">
        <header id="myheader">
        <nav id="mynav">
            <div class="menuTitle">노래 페이지</div>
            <div id="headerMenuPC">
            <div class="headerMenuItem"></div>
            <div class="headerMenuItem">
                <svg xmlns="http://www.w3.org/2000/svg" style="fill: rgb(250, 188, 188)" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-shopping-cart">
                <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span>장바구니</span>
            </div>
            <div class="headerMenuItem">
                <svg xmlns="http://www.w3.org/2000/svg" style="fill: rgb(136, 136, 248)" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-log-in">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                <polyline points="10 17 15 12 10 7"></polyline>
                <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
                <span>로그인</span>
            </div>
            <div class="headerMenuItem flexSpacebetween">
                <div>&nbsp;</div>
                <div>
                <label>검색</label>
                <input type="text" placeholder="찾을 단어 검색" />
                </div>
            </div>
            </div>
            <div id="headerMenuMobile">
            <div class="headerMenuItem">
                <svg xmlns="http://www.w3.org/2000/svg" style="fill: yellow" width="24px" height="24px" viewBox="0 0 50 50">
                <path d="M 21 3 C 11.601563 3 4 10.601563 4 20 C 4 29.398438 11.601563 37 21 37 C 24.355469 37 27.460938 36.015625 30.09375 34.34375 L 42.375 46.625 L 46.625 42.375 L 34.5 30.28125 C 36.679688 27.421875 38 23.878906 38 20 C 38 10.601563 30.398438 3 21 3 Z M 21 7 C 28.199219 7 34 12.800781 34 20 C 34 27.199219 28.199219 33 21 33 C 13.800781 33 8 27.199219 8 20 C 8 12.800781 13.800781 7 21 7 Z"/>
                </svg>
            </div>
            <div class="headerMenuItem">
                <svg xmlns="http://www.w3.org/2000/svg" style="fill: rgb(136, 136, 248)" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-log-in">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                <polyline points="10 17 15 12 10 7"></polyline>
                <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
            </div>
            <div class="headerMenuItem">
                <svg xmlns="http://www.w3.org/2000/svg" style="fill: rgb(250, 188, 188)" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-shopping-cart">
                <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
            </div>
            </div>
        </nav>
        </header>

        <main id="mymain">
        <section class="heading">
            <h1 class="heading_title">노래에 대한 정보</h1>
            <p class="heading_text">
                노래의 종류에는 인디, 팝송, kpop, jpop등 여러가지들이 있습니다.
                여러 노래들을 들어보세요.
            </p>
        </section>
        <section class="content">
            <picture class="content_pic">
            <img class="content_img" src="sing01.jpg" alt="노래 앨범 사진"/>
            </picture>
        </section>
        </main>

        <footer id="myfooter">
        <div>made by 2025-12-26, 주민상</div>
        </footer>
    </body>
    </html>
