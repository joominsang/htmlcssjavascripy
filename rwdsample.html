
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>반응형 웹 실습 예제</title>
    <link rel="stylesheet" href="./css/rwd.css" />
</head>
<body>

<header class="header">
    <h1>반응형 웹 실습</h1>
</header>

<section class="hero">
    <h2>모바일 퍼스트 반응형 웹</h2>
    <p>화면 크기에 따라 레이아웃과 글자 크기가 변화합니다.</p>
</section>

<section class="cards">
    <div class="card">콘텐츠 1</div>
    <div class="card">콘텐츠 2</div>
    <div class="card">콘텐츠 3</div>
</section>

<section class="image-area">
    <h2>반응형 이미지</h2>

    <picture>
        <source media="(min-width: 1024px)" srcset="https://picsum.photos/1200/400">
        <source media="(min-width: 600px)" srcset="https://picsum.photos/800/300">
        <img src="https://picsum.photos/400/200" alt="예제 이미지">
    </picture>
</section>

<footer class="footer">
    © 2025 Responsive Example
</footer>

</body>
</html>
