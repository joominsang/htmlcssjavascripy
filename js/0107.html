<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./css/0107-2.css" />
</head>
<body>
  <header>
    <h1>jquery 를 이용한 동적 화면</h1>
  </header>
  <main>
    <section id="inputSection">
      <fieldset>
        <legend>학생정보</legend>
        <div>
          <label for="id">ID : </label>
          <input type="number" id="id" />
        </div>
        <div>
          <label for="name">Name : </label>
          <input type="text" id="name" maxlength="10" />
        </div>
        <div>
          <label for="kor">KOR : </label>
          <input type="number" id="kor" min="0" max="100" />
        </div>
        <div>
          <label for="eng">ENG : </label>
          <input type="number" id="eng" min="0" max="100" />
        </div>
        <div>
          <label for="mat">MAT : </label>
          <input type="number" id="mat" min="0" max="100" />
        </div>
        <div>
          <label for="clss">CLASS : </label>
          <input type="text" id="clss" maxlength="6" />
        </div>
        <div>
          <button id="btnAddStudent">Add</button>
        </div>
      </fieldset>
    </section>
    <section id="listSection">
      <ul id="ulList">
        <li id="titleLi">
          <div>
            <div>id</div>
          </div>
          <div>
            <div>name</div>
          </div>
          <div>
            <div>kor</div>
          </div>
          <div>
            <div>eng</div>
          </div>
          <div>
            <div>mat</div>
          </div>
          <div>
            <div>clss</div>
          </div>
        </li>
        <li class="dataLi">
          <div>
            <div>1</div>
          </div>
          <div>
            <div>김철수</div>
          </div>
          <div>
            <div>90</div>
          </div>
          <div>
            <div>85</div>
          </div>
          <div>
            <div>88</div>
          </div>
          <div>
            <div>3-1</div>
          </div>
        </li>
      </ul>
    </section>
  </main>
  <footer>
    made by 주민상.
  </footer>
</body>
</html>
<script src="./js/jquery.min.js"></script>
<script src="0107.js" async></script>
