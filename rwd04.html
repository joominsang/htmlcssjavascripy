
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .headerRow {
        display: grid;
        grid-template-columns: 150px auto;
      }
      .headerItem1 {
        background-color: slateblue;
        margin: 10px;
        text-align: center;
      }
      .headerItem2 {
        background-color: darkkhaki;
        margin: 10px;
        text-align: center;
      }
      .section1 {
        display: grid;
        grid-template-rows: 1fr 2fr;
        margin: 14px 0px;
      }
      .section1_title {
        text-align: center;
        background-color: yellow;
        margin: 4px 10px;
      }
      .section1_content {
        text-align: center;
        background-color: lightgray;
        margin: 4px 10px;
        line-height: 70px;
      }
      .bg_pink {
        background-color: deeppink;
      }
      .bg_green {
        background-color: greenyellow;
      }
      div {
        /* border: 1px solid black; */
      }
      @media (min-width: 600px) {
        .headerRow {
          /* display: grid; */
          grid-template-columns: 1fr 1fr;
        }
        .section1 {
          display: grid;
          grid-template-columns: 1fr 1fr;
          grid-template-areas:
            "sect1 sect2"
            "sect3 sect2";
          grid-template-rows: auto;
        }
        .sect2 {
          grid-column: 2 / 3;
          grid-row: 1 / 3;
          margin: 4px 10px 4px 0px;
          line-height: 100px;
        }
        .sect3 {
          margin: 4px 0px 4px 10px;
        }
      }
      /* @media (orientation: portrait) {
        .headerRow {
          display: grid;
          grid-template-columns: 1fr 4fr;
        }
      } */
      @media (min-width: 600px) and (orientation: landscape) {
        .headerRow {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }
      }
      @media (min-width: 1024px) {
        .headerRow {
          display: grid;
          grid-template-columns: 120px auto;
        }
        .main_section {
          display: grid;
          grid-template-columns: 1fr 1fr 1fr;
        }
        .section1 {
          display: grid;
          grid-template-areas: none;
          grid-template-columns: 1fr;
          grid-template-rows: 1fr 3fr;
        }
        .sect1 {
          line-height: 50px;
        }
        .sect2 {
          grid-column: 1 / 3;
          grid-row: 2 / 3;
          margin: 10px;
          line-height: 150px;
        }
        .sect3 {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="myheader">
      <div class="headerRow">
        <div class="headerItem1">제목1</div>
        <div class="headerItem2">제목2</div>
      </div>
    </header>
    <main class="main_section">
      <section>
        <div class="section1">
          <div class="section1_title sect1">섹션제목1</div>
          <div class="section1_content sect2">섹션내용1</div>
          <div class="section1_content sect3">섹션내용1</div>
        </div>
      </section>
      <section>
        <div class="section1">
          <div class="section1_title bg_pink sect1">섹션제목2</div>
          <div class="section1_content sect2">섹션내용2</div>
          <div class="section1_content sect3">섹션내용2</div>
        </div>
      </section>
      <section>
        <div class="section1">
          <div class="section1_title bg_green sect1">섹션제목3</div>
          <div class="section1_content sect2">섹션내용3</div>
          <div class="section1_content sect3">섹션내용3</div>
        </div>
      </section>
    </main>
  </body>
</html>
